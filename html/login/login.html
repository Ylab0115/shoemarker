<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <title>슈마커 플러스</title>

  <link rel="stylesheet" href="../../assets/css/style.css">
  <!-- Library -->
  <link rel="stylesheet" href="../../assets/css/swiper-bundle.min.css">
</head>
<body>
  <div id="wrap">

    <!-- Header -->
    <header id="header" class="header"></header>

    <!-- Content -->
    <main class="container page-login">
      <section class="section">
        <div class="section__inner">
          <!-- 타이틀 -->
          <div class="section__header">
            <button type="button" class="btn-icon btn-icon--back" aria-label="뒤로가기">
              <span class="btn-icon__icon"></span>
            </button>
            <h2 class="section__title">로그인</h2>
          </div>
          <div class="login">
            <div class="login__inner">

              <div class="tab tab--line js-tabs">
                <!-- 탭 메뉴 -->
                <div class="tab__list" role="tablist">
                  <!-- 활성화 상태 is-active -->
                  <button type="button" role="tab" class="tab__btn js-tab-btn is-active" aria-selected="true">
                    회원 로그인
                  </button>
                  <button type="button" role="tab" class="tab__btn js-tab-btn" aria-selected="false">
                    비회원 로그인
                  </button>
                </div>

                <!-- 탭 컨텐츠 -->
                <div class="tab__panels">
                  <div class="tab__panel js-tab-panel is-active">
                    <!-- 폼 -->
                    <div class="form">
                      <!-- 아이디 -->
                      <div class="form__field">
                        <label for="input1" class="form__label">아이디</label>
                        <input type="text" id="input1" class="form__input" />
                      </div>
                      
                      <!-- 비밀번호 -->
                      <div class="form__field">
                        <label for="input2" class="form__label">비밀번호</label>
                        <input type="password" id="input2" class="form__input" />
                      </div>
          
                      <!-- 옵션 영역 -->
                      <div class="login__options">
                        <!-- 자동 로그인 -->
                        <div class="checkbox">
                          <input type="checkbox" id="check1"  class="checkbox__input" />
                          <label for="check1" class="checkbox__label">자동 로그인</label>
                        </div>
                        <!-- 아이디 저장 -->
                        <div class="checkbox">
                          <input type="checkbox" id="check2"  class="checkbox__input"/>
                          <label for="check2" class="checkbox__label">아이디 저장</label>
                        </div>
          
                      </div>
                    </div>
          
                    <!-- 자동입력방지 -->
                    <div class="login__captcha">
                      <div class="captcha">
                        <div class="captcha__group">
                          <h3 class="captcha__title">자동입력방지</h3>
                          <!-- 자동입력방지 영역 -->
                          <div id="captcha" class="captcha__box" aria-label="자동입력방지 영역">
                          </div>
                        </div>              
                        <div class="form__field">
                          <input type="text" class="form__input" placeholder="자동입력 방지 문자"/>
                        </div>
                      </div>
                    </div>
          
                    <!-- 버튼 -->
                    <div class="cta cta--stack">
                      <button type="button" class="btn btn--primary">로그인하기</button>
                      <a href="#" class="btn btn--line">회원가입하기</a>
                    </div>
          
                    <!-- 링크 영역 -->
                    <div class="login__links">
                      <a href="#" class="btn btn--text">아이디 찾기</a>
                      <a href="#" class="btn btn--text">비밀번호 찾기</a>
                    </div>
          
                    <!-- 간편 로그인 -->
                    <div class="login__sns">
                      <h3 class="login__sns-title">간편 로그인</h3>
                      <div class="login__sns-list">
                        <button class="btn-sns btn-sns--naver" aria-label="네이버로 로그인">
                          <span class="btn-sns__icon"></span>
                        </button>
                        <button class="btn-sns btn-sns--kakao" aria-label="카카오로 로그인">
                          <span class="btn-sns__icon"></span>
                        </button>
                      </div>
                    </div>
                  </div>
                  <div class="tab__panel js-tab-panel">
                    <!-- 폼 -->
                    <div class="form">
                      <!-- 이름 -->
                      <div class="form__field">
                        <label for="input3" class="form__label">이름</label>
                        <input type="text" id="input3" class="form__input" />
                      </div>
                      
                      <!-- 전화번호 -->
                      <div class="form__field">
                        <label for="input4" class="form__label">전화번호</label>
                        <input type="text" id="input4" class="form__input" />
                      </div>

                      <!-- 이메일 -->
                      <div class="form__field">
                        <label for="input5" class="form__label">이메일</label>
                        <input type="text" id="input5" class="form__input" />
                      </div>
                    </div>

                    <!-- 버튼 -->
                    <div class="cta cta--stack">
                      <button type="button" class="btn btn--primary">주문조회하기</button>
                    </div>

                    <!-- 안내사항 -->
                    <ul class="list list--dot list--sm">
                      <li>비회원 주문 시 입력한 이름, 휴대폰 번호, 이메일 주소 모두 정확하게 <br class="is-pc">입력해 주세요.</li>
                      <li>비회원 주문 정보가 기억나지 않으실 경우 고객센터에 문의해 주세요. <br>(슈마커 고객센터 : 080-030-2809)</li>
                    </ul>

                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer id="footer" class="footer"></footer>
  </div>

  <!-- Scripts  -->
  <script src="../../assets/js/jquery-3.7.1.min.js"></script>
  <script src="../../assets/js/swiper-bundle.min.js"></script>
  <script src="../../assets/js/ui.js"></script>
  <!-- Script for loading header and footer (퍼블용) -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      ["header", "footer"].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        const file = el.dataset.file || `${id}.html`;
        fetch(`../include/${file}`)
          .then(res => res.text())
          .then(html => (el.innerHTML = html));
      });
    });
  </script>
</body>
</html>
