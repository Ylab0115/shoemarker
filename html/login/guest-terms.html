<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <title>슈마커 플러스</title>

  <link rel="stylesheet" href="../../assets/css/style.css">
  <!-- Library -->
  <link rel="stylesheet" href="../../assets/css/swiper-bundle.min.css">
</head>
<body>
  <div id="wrap">

    <!-- Header -->
    <header id="header" class="header"></header>

    <!-- Content -->
    <main class="container page-join page-join--guest">
      <!-- 하단 고정 버튼이 있을 경우 section--fixed 추가 -->
      <section class="section section--fixed">
        <div class="section__inner">
          <!-- 타이틀 -->
          <div class="section__header">
            <button type="button" class="btn-icon btn-icon--back" aria-label="뒤로가기">
              <span class="btn-icon__icon"></span>
            </button>
            <h2 class="section__title">비회원 구매</h2>
          </div>
          <div class="join">
            <div class="join__inner">
              <p class="join__text">비회원 구매 이용에 필요한 약관에 <br />동의해 주세요!</p>
              <!-- 약관 -->
              <div class="terms">
                <ul class="terms__list">
                  <li class="terms__item">
                    <div class="terms__main">
                      <div class="checkbox">
                        <input type="checkbox" id="check1"  class="checkbox__input" />
                        <label for="check1" class="checkbox__label">[필수] 개인정보 이용 및 수집 동의</label>
                      </div>
                      <button type="button" class="js-modal-open btn-icon btn-icon--sm btn-icon--next" aria-label="약관 보기" data-target="#modal1">
                        <span class="btn-icon__icon"></span>
                      </button>
                    </div>
                  </li>
                </ul>                
              </div>
              <!-- 버튼 -->
              <div class="cta cta--fixed">
                <button type="button" class="btn btn--primary">비회원 구매하기</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer id="footer" class="footer"></footer>
  </div>

  <!-- modal1 -->
  <div id="modal1" class="modal">
    <!-- dim -->
    <div class="modal__dim"></div>
    <!-- modal content -->
    <div class="modal__content">
      <div class="modal__header">
        <h2 class="modal__title">개인정보 수집/이용에 대한 약관</h2>
        <button type="button" class="modal__close btn-icon btn-icon--close" aria-label="닫기">
          <span class="btn-icon__icon"></span>
        </button>
      </div>

      <div class="modal__body">
        <div class="modal__filter is-mo">
          <div class="select">
            <label for="termsDate" class="select__label select__label--hide">개정 약관 날짜 선택</label>
            <div class="select__box">
              <select id="termsDate" class="select__field">
                <option value="">2022.05.20. 개정</option>
                <option value="">옵션2</option>
                <option value="">옵션3</option>
              </select>
            </div>
          </div>
        </div>

        <div class="content">
          <p>Admin 등록 약관 내용 표기 (내용 넣으면 높이가 늘어납니다.)</p>
        </div>
      </div>
    </div>
  </div>



  <!-- Scripts  -->
  <script src="../../assets/js/jquery-3.7.1.min.js"></script>
  <script src="../../assets/js/swiper-bundle.min.js"></script>
  <script src="../../assets/js/ui.js"></script>
  <!-- Script for loading header and footer (퍼블용) -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      ["header", "footer"].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        const file = el.dataset.file || `${id}.html`;
        fetch(`../include/${file}`)
          .then(res => res.text())
          .then(html => (el.innerHTML = html));
      });
    });
  </script>
</body>
</html>
