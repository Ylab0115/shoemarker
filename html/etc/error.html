<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <title>슈마커 플러스</title>

  <link rel="stylesheet" href="../../assets/css/style.css">
  <!-- Library -->
  <link rel="stylesheet" href="../../assets/css/swiper-bundle.min.css">
</head>
<body>
  <div id="wrap">

    <!-- Header -->
    <header id="header" class="header"></header>

    <!-- Content -->
    <main class="container page-error">
      <section class="section">
        <div class="section__inner">
          <!-- error -->
          <div class="error">
            <div class="error__content">
              <div class="error__message">
                <p>
                  페이지를 찾을 수 없습니다. <br>
                  요청하신 페이지가 존재하지 않거나 이동되었을 수 있습니다.
                </p>
                <p>
                  입력하신 주소를 다시 확인하시거나 <br>
                  아래 버튼을 통해 이동해 주세요.
                </p>
              </div>
              <div class="btn-wrap">                
                <a href="#" class="btn btn--line btn--secondary">이전 페이지로 돌아가기</a>
                <a href="#" class="btn btn--primary">홈으로 가기</a>
              </div>
              <p class="error__notice">
                ※ 문제가 계속될 경우, 고객센터로 문의해 주세요.
              </p>
            </div>
          </div>
          <!-- //error -->           
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer id="footer" class="footer"></footer>
  </div>

  <!-- Scripts  -->
  <script src="../../assets/js/jquery-3.7.1.min.js"></script>
  <script src="../../assets/js/swiper-bundle.min.js"></script>
  <script src="../../assets/js/ui.js"></script>
  <!-- Script for loading header and footer (퍼블용) -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      ["header", "footer"].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        const file = el.dataset.file || `${id}.html`;
        fetch(`../include/${file}`)
          .then(res => res.text())
          .then(html => (el.innerHTML = html));
      });
    });
  </script>
</body>
</html>
