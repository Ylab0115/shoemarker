  <!-- Scripts  -->
  <script src="../../assets/js/jquery-3.7.1.min.js"></script>
  <script src="../../assets/js/swiper-bundle.min.js"></script>
  <script src="../../assets/js/ui.js"></script>
  <!-- Script for loading header and footer (퍼블용) -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      ["header", "footer", "tabbar", "mobilegnb"].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        const file = el.dataset.file || `${id}.html`;
        fetch(`../include/${file}`)
          .then(res => res.text())
          .then(html => (el.innerHTML = html));
      });
    });

    window.addEventListener('load', function () {
      const INITIAL_SLIDE = 0;
      const slides = document.querySelectorAll('#launchSliderSwiper .swiper-slide');
      const navList = document.getElementById('launchSliderNavList');

      slides.forEach((slide, i) => {
        const item = document.createElement('li');
        item.className = 'launch-slider__nav-item' + (i === INITIAL_SLIDE ? ' is-active' : '');
        item.textContent = slide.dataset.name;
        item.dataset.idx = i;
        navList.appendChild(item);
      });

      let mainSw = null;

      function initSwiper(currentSlide = INITIAL_SLIDE) {
        const isMobile = window.innerWidth <= 1024;

        if (mainSw) mainSw.destroy(true, true);

        mainSw = new Swiper('#launchSliderSwiper', {
          direction: isMobile ? 'horizontal' : 'vertical',
          effect: isMobile ? 'slide' : 'coverflow',
          coverflowEffect: {
            rotate: 20,
            depth: 100,
            slideShadows: false,
          },
          autoplay : {
            delay : 4000,
            disableOnInteraction : false,
          },
          loop : true,
          loopAdditionalSlides : 1,
          speed: 680,
          grabCursor: true,
          initialSlide: currentSlide,
          on: {
            slideChangeTransitionStart(sw) {
              document.querySelectorAll('.launch-slider__nav-item').forEach((n, i) => {
                n.classList.toggle('is-active', i === sw.realIndex);
              });
              const activeItem = navList.querySelector('.is-active');
              if (activeItem) {
                activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
              }
            },
          },
        });

        navList.addEventListener('click', (e) => {
          const item = e.target.closest('.launch-slider__nav-item');
          if (item) mainSw.slideTo(+item.dataset.idx);
        });
      }

      initSwiper();

      let resizeTimer = null;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
          initSwiper(mainSw?.realIndex ?? INITIAL_SLIDE);
        }, 300);
      });
    });
  </script>
