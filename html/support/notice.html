<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <title>슈마커 플러스</title>

  <link rel="stylesheet" href="../../assets/css/style.css">
  <!-- Library -->
  <link rel="stylesheet" href="../../assets/css/swiper-bundle.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>
  <div id="wrap">

    <!-- Header -->
    <header id="header" class="header"></header>

    <!-- Content -->
    <!-- lnb 있을 경우 has-lnb 추가 -->
    <main class="container page-notice has-lnb">

      <!-- lnb -->
      <aside id="lnb-support" class="lnb"></aside>

      <!-- 하단 고정 버튼이 있을 경우 section--fixed 추가 -->
      <section class="section section--fixed">
        <div class="section__inner"> 
          <!-- 타이틀 -->
          <div class="section__header">
            <button type="button" class="btn-icon btn-icon--back" aria-label="뒤로가기">
              <span class="btn-icon__icon"></span>
            </button>
            <h2 class="section__title">공지사항</h2>
          </div>

          <div class="notice">
            <p class="notice__num">총 <span>18</span>개</p>
            <ul class="notice__list">
              <li class="notice__item">
                <a href="#" class="notice__link">
                  <span class="notice__text">슈마커 플러스 멤버십 성정 기준 및 혜택 안내 슈마커 플러스 멤버십 성정 기준 및 혜택 안내 슈마커 플러스 멤버십 성정 기준 및 혜택 안내 슈마커 플러스 멤버십 성정 기준 및 혜택 안내</span>
                  <span class="notice__date">2026.08.01(수)</span>
                </a>
              </li>
              <li class="notice__item">
                <a href="#" class="notice__link">
                  <span class="notice__text">서비스 이용 제한 안내</span>
                  <span class="notice__date">2026.08.01(수)</span>
                </a>
              </li>
              <li class="notice__item">
                <a href="#" class="notice__link">
                  <span class="notice__text">4.23(수) 시스템 점검 안내</span>
                  <span class="notice__date">2026.08.01(수)</span>
                </a>
              </li>
            </ul>
            <div class="btn-wrap">
              <button type="button" class="btn btn--line btn--secondary btn--lg btn--block">더보기</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer id="footer" class="footer"></footer>

  </div>

  <!-- Scripts  -->
  <script src="../../assets/js/jquery-3.7.1.min.js"></script>
  <script src="../../assets/js/swiper-bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
  <script src="../../assets/js/ui.js"></script>
  <!-- Script for loading header and footer (퍼블용) -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      ["header", "lnb-support", "footer"].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        const file = el.dataset.file || `${id}.html`;
        fetch(`../include/${file}`)
          .then(res => res.text())
          .then(html => (el.innerHTML = html));
      });
    });
  </script>
</body>
</html>
