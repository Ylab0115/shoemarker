<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <title>슈마커 플러스</title>

  <link rel="stylesheet" href="../../assets/css/style.css">
  <!-- Library -->
  <link rel="stylesheet" href="../../assets/css/swiper-bundle.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>
  <div id="wrap">

    <!-- Header -->
    <header id="header" class="header"></header>

    <!-- Content -->
    <main class="container page-storeinfor">
      <section class="section">
        <div class="section__inner"> 
          <!-- 타이틀 -->
          <div class="section__header">
            <button type="button" class="btn-icon btn-icon--back" aria-label="뒤로가기">
              <span class="btn-icon__icon"></span>
            </button>
            <!-- Brand name -->
            <h2 class="section__title">매장 안내</h2>
            <div class="section__util">
              <button type="button" class="btn-icon btn-icon--cart" aria-label="장바구니 보기">
                <span class="btn-icon__icon"></span>
              </button>
            </div>
          </div>

          <!-- Content -->
          <div class="storeinfor-content">
            <!-- 매장 찾기 컨텐츠 -->
            <div class="store-finder">
              <div class="radio-group">
                <div class="radio-btn">
                  <input type="radio" id="shoemarkerPlus" name="radioSet2" class="radio-btn__input" checked="">
                  <label for="shoemarkerPlus" class="radio-btn__label">슈마커 플러스</label>
                </div>
                <div class="radio-btn">
                  <input type="radio" id="shoemarker" name="radioSet2" class="radio-btn__input">
                  <label for="shoemarker" class="radio-btn__label">슈마커</label>
                </div>
              </div>

              <div class="search">
                <div class="select">
                  <label for="region" class="select__label">지역선택</label>
                  <div class="select__box">
                    <select id="region" class="select__field">
                      <option value="" disabled selected hidden>선택해 주세요.</option>
                      <option value="">서울</option>
                      <option value="">경기</option>
                      <option value="">대구</option>
                      <option value="">대전</option>
                      <option value="">부산</option>
                      <option value="">광주</option>
                    </select>
                  </div>
                </div>
                <div class="search__field">
                  <input type="text" id="input1" class="form__input" value="" placeholder="매장명을 입력해 주세요." />
                  <button type="button" class="btn btn--lg btn--line btn--secondary">검색</button>
                </div>
              </div>
              <div class="map">
                <div class="map__area">
                  <div id="map" class="map__inner">
                    <!-- 지도 샘플 이미지 -->
                    <img src="../../assets/images/img_map_sample.jpg" alt="">
                  </div>
                </div>
              </div>
              <ul class="store-list">
                <li class="store-list__item">
                  <div class="store-list__info">
                    <div class="radio">
                      <input type="radio" id="store1" name="store" class="radio__input" />
                      <label for="store1" class="radio__label">
                        <p class="store-list__name">거제디큐브시티점</p>
                      </label>
                    </div>
                    <span class="store-list__address">경상남도 거제시 장평로 12 디큐브시티 거제점 3층</span>
                    <span class="store-list__tel">055-680-0327</span>
                  </div>
                  <span class="store-list__icon" aria-hidden="true"></span>                
                </li>
                <li class="store-list__item">
                  <div class="store-list__info">
                    <div class="radio">
                      <input type="radio" id="store2" name="store" class="radio__input" />
                      <label for="store2" class="radio__label">
                        <p class="store-list__name">거제디큐브시티점</p>
                      </label>
                    </div>
                    <span class="store-list__address">경상남도 거제시 장평로 12 디큐브시티 거제점 3층</span>
                    <span class="store-list__tel">055-680-0327</span>
                  </div>
                  <span class="store-list__icon" aria-hidden="true"></span>
                </li>
                <li class="store-list__item">
                  <div class="store-list__info">
                    <div class="radio">
                      <input type="radio" id="store3" name="store" class="radio__input" />
                      <label for="store3" class="radio__label">
                        <p class="store-list__name">거제디큐브시티점</p>
                      </label>
                    </div>
                    <span class="store-list__address">경상남도 거제시 장평로 12 디큐브시티 거제점 3층</span>
                    <span class="store-list__tel">055-680-0327</span>
                  </div>
                  <span class="store-list__icon" aria-hidden="true"></span>
                </li>
                <li class="store-list__item">
                  <div class="store-list__info">
                    <div class="radio">
                      <input type="radio" id="store4" name="store" class="radio__input" />
                      <label for="store4" class="radio__label">
                        <p class="store-list__name">거제디큐브시티점</p>
                      </label>
                    </div>
                    <span class="store-list__address">경상남도 거제시 장평로 12 디큐브시티 거제점 3층</span>
                    <span class="store-list__tel">055-680-0327</span>
                  </div>
                  <span class="store-list__icon" aria-hidden="true"></span>
                </li>
              </ul>
            </div>
            <div class="cta">
              <button type="button" class="btn btn--primary">픽업 매장 선택</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer id="footer" class="footer"></footer>

    <!-- Tab bar -->
    <nav id="tabbar" class="tabbar"></nav>

    <!-- 모바일 GNB -->
    <div id="mobilegnb"></div>

  </div>

  <!-- Scripts  -->
  <script src="../../assets/js/jquery-3.7.1.min.js"></script>
  <script src="../../assets/js/swiper-bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
  <script src="../../assets/js/ui.js"></script>
  <!-- Script for loading header and footer (퍼블용) -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      ["header", "footer", "tabbar", "mobilegnb"].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        const file = el.dataset.file || `${id}.html`;
        fetch(`../include/${file}`)
          .then(res => res.text())
          .then(html => (el.innerHTML = html));
      });
    });
  </script>
</body>
</html>
